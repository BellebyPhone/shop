<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BellByPhone - Mobile Ministore</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                        heading: ['Prompt', 'sans-serif']
                    },
                    colors: {
                        pastel: {
                            50: '#fff5f8', // สีพื้นหลังหลัก
                            100: '#ffe4e8',
                            200: '#ffcdd2',
                            300: '#f48fb1',
                            400: '#f06292', // สีหลัก
                            500: '#e91e63',
                            600: '#d81b60'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #fff5f8; 
            color: #333333;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        body::-webkit-scrollbar { display: none; }

        /* การ์ดสไตล์ Minimal */
        .card-minimal {
            background: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(240, 98, 146, 0.08);
            transition: all 0.3s ease;
        }
        .card-minimal:hover {
            box-shadow: 0 8px 30px rgba(240, 98, 146, 0.15);
            transform: translateY(-2px);
        }

        /* Glassmorphism เบาๆ สำหรับ Navbar */
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 228, 232, 0.5);
        }

        /* Animation Fade In */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input สไตล์มินิมอล */
        .input-minimal {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            border: 1px solid #ffcdd2;
            outline: none;
            background: #ffffff;
            font-family: 'Kanit', sans-serif;
            transition: all 0.2s;
        }
        .input-minimal:focus {
            border-color: #f06292;
            box-shadow: 0 0 0 3px rgba(240, 98, 146, 0.1);
        }

        /* ปุ่มกด */
        .btn-primary {
            background-color: #f06292;
            color: white;
            border-radius: 1rem;
            padding: 0.8rem 1.5rem;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary:hover { background-color: #e91e63; }
        
        .btn-outline {
            background-color: transparent;
            color: #f06292;
            border: 1px solid #f06292;
            border-radius: 1rem;
            padding: 0.8rem 1.5rem;
            font-family: 'Prompt', sans-serif;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-outline:hover { background-color: #fff5f8; }

        /* แบนเนอร์อัตราส่วน 1200x400 (3:1) */
        .banner-container {
            aspect-ratio: 3 / 1;
            width: 100%;
            overflow: hidden;
            border-radius: 1.5rem;
            position: relative;
        }
    </style>
</head>
<body class="antialiased min-h-screen relative pb-24">

    <header class="glass-nav sticky top-0 z-40 p-4 flex justify-between items-center w-full">
        <div class="max-w-4xl mx-auto w-full flex justify-between items-center px-2">
            <div class="flex items-center gap-3 cursor-pointer" onclick="switchPage('home')">
                <div class="w-10 h-10 bg-pastel-100 rounded-full flex items-center justify-center text-pastel-500 text-lg">
                    <i class="fa-solid fa-mobile-screen"></i>
                </div>
                <div>
                    <h1 class="font-heading text-xl font-semibold text-pastel-600 leading-tight">BellByPhone</h1>
                    <p class="text-[10px] text-pastel-400 font-medium tracking-wide">MINIMAL MINISTORE</p>
                </div>
            </div>
            <button onclick="showContactInfo()" class="text-pastel-400 hover:text-pastel-600 transition text-xl">
                <i class="fa-brands fa-line"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto w-full px-4 pt-6" id="main-content">
        </main>

    <nav class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[85%] max-w-sm bg-white rounded-2xl shadow-[0_10px_40px_rgba(240,98,146,0.15)] px-6 py-3 flex justify-between items-center z-40 border border-pastel-50">
        <button onclick="switchPage('home')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-pastel-500 transition w-16">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] font-medium">หน้าแรก</span>
        </button>
        <button onclick="switchPage('payment')" class="flex flex-col items-center gap-1 text-gray-400 hover:text-pastel-500 transition w-16">
            <i class="fa-solid fa-receipt text-lg"></i>
            <span class="text-[10px] font-medium">ส่งยอด</span>
        </button>
        <button onclick="promptAdminLogin()" class="flex flex-col items-center gap-1 text-gray-400 hover:text-pastel-500 transition w-16">
            <i class="fa-solid fa-gear text-lg"></i>
            <span class="text-[10px] font-medium">ตั้งค่า</span>
        </button>
    </nav>

    <div id="templates" class="hidden">

        <div id="tpl-home" class="fade-in">
            <div class="banner-container shadow-md mb-8 bg-white">
                <div id="main-banner-slider" class="w-full h-full relative transition-transform duration-500">
                    </div>
            </div>

            <div class="mb-4 px-2">
                <h2 class="text-lg font-heading font-semibold text-gray-800 border-l-4 border-pastel-400 pl-3">สินค้าทั้งหมด</h2>
            </div>

            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 pb-10">
                </div>
        </div>

        <div id="tpl-register" class="fade-in">
            <div class="card-minimal p-6 mb-10">
                <h2 class="text-xl font-heading font-semibold text-pastel-600 mb-6 border-b border-pastel-100 pb-3">ข้อมูลสำหรับลงทะเบียน</h2>
                
                <form id="reg-form" onsubmit="submitRegistration(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">ชื่อจริง (ภาษาไทย)</label>
                            <input type="text" id="reg-firstname" required class="input-minimal">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">นามสกุล (ภาษาไทย)</label>
                            <input type="text" id="reg-lastname" required class="input-minimal">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">เบอร์โทรศัพท์</label>
                        <input type="tel" id="reg-phone" required maxlength="10" class="input-minimal">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">เลขประจำตัวประชาชน (13 หลัก)</label>

                    <div class="grid grid-cols-2 gap-4">

                            <input type="number" id="reg-age" required min="15" class="input-minimal">

                    </div>
                    <div class="grid grid-cols-2 gap-4">

                            <label class="block text-sm text-gray-600 mb-1">จังหวัด</label>
                            <input type="text" id="reg-province" required class="input-minimal">

                        <div>
                            <label class="block text-sm text-gray-600 mb-1">เพศ</label>
                            <select id="reg-gender" class="input-minimal">

                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>

                    <div class="mt-4">

                        <button type="submit" id="reg-submit-btn" class="btn-primary w-2/3">ยืนยันลงทะเบียน</button>

            </div>

        <div id="tpl-payment" class="fade-in">

                <p class="text-sm text-gray-500 mb-8">กดปุ่มด้านล่างเพื่อส่งสลิปการโอนเงินผ่านทาง LINE Official ของทางร้านนะคะ</p>
                <button onclick="openLine()" class="btn-primary w-full max-w-xs mx-auto flex justify-center items-center gap-2">

        </div>

        <div id="tpl-admin" class="fade-in">

            <div class="card-minimal p-5 mb-6">
                <h3 class="font-heading text-md font-medium text-gray-800 mb-4 pb-2 border-b border-gray-100">ตั้งค่าเว็บไซต์</h3>
                <div class="space-y-4">
                    <div>

                        <textarea id="adm-main-banner" class="input-minimal text-sm" rows="2" placeholder="หากมีหลายรูปคั่นด้วย ,"></textarea>
                    </div>
                    <div>

                        <input type="text" id="adm-pay-banner" class="input-minimal text-sm">

                    </div>
                    <button onclick="adminSaveSettings()" class="w-full bg-gray-800 text-white rounded-xl py-3 font-heading text-sm hover:bg-gray-900 transition">บันทึกการตั้งค่าเว็บ</button>

            <div class="card-minimal p-5 mb-10">

                    <input type="text" id="adm-prod-img" placeholder="ลิงก์รูปภาพสินค้า" class="input-minimal text-sm">
                    <div class="grid grid-cols-2 gap-3">

                        <input type="text" id="adm-prod-storage" placeholder="ความจุ (128GB, 256GB)" class="input-minimal text-sm">

                        <input type="text" id="adm-prod-color" placeholder="สี (ระบุได้หลายสีคั่นด้วย ,)" class="input-minimal text-sm">
                        <select id="adm-prod-type" class="input-minimal text-sm">

            <button onclick="closeModal()" class="absolute top-4 right-4 bg-gray-100 text-gray-500 w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-200 transition z-10">

            </button>
            
            <div class="p-6 pb-2 flex justify-center mt-2">

            </div>
            
            <div class="px-6 space-y-5">
                <div class="text-center border-b border-gray-100 pb-4">

                    <div class="flex justify-center gap-3 text-sm">

                        <span class="text-pastel-500 font-medium bg-pastel-50 px-2 py-0.5 rounded">ดาวน์ <span id="modal-down"></span> ฿</span>

                <div class="grid grid-cols-2 gap-3">

                        <label class="block text-sm text-gray-600 mb-1">ความจุ</label>

                    </div>

                            <span class="text-xs text-gray-500">ระยะเวลาประมาณ</span>

    <script>
        // ใส่ลิงก์ GAS Web App URL ที่ Deploy ไว้
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyT-ZVfmWVto7Ig15J2Sm26JGZjgyJv15i5i_ywp_Wq-p_XwoGQCywnoPgGQ-q_Dgrw/exec";
        const ADMIN_PASSWORD = "bellbyphone01";

        let storeProducts = [];
        let storeSettings = {
            bannerUrls: "https://images.unsplash.com/photo-1616348436168-de43ad0db179?w=1200", // แบนเนอร์หลัก
            paymentBannerUrl: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=1200", // แบนเนอร์ส่งยอด
            welcomePopup: "ยินดีต้อนรับสู่ BellByPhone ค่ะ",
            lineUrl: "https://line.me/ti/p/~",
            fbUrl: "https://facebook.com/"
        };
        
        let selectedProductInfo = {}; 
        let bannerInterval;

        window.onload = async () => {
            switchPage('home');
            await loadInitialData();
            showWelcomePopup();
        };

        function switchPage(pageId) {
            const mainContent = document.getElementById('main-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if (pageId === 'home') {
                mainContent.innerHTML = document.getElementById('tpl-home').innerHTML;
                renderStoreHome();
            } else if (pageId === 'register') {
                mainContent.innerHTML = document.getElementById('tpl-register').innerHTML;
            } else if (pageId === 'payment') {
                mainContent.innerHTML = document.getElementById('tpl-payment').innerHTML;
                // เซ็ตแบนเนอร์แยกสำหรับหน้าส่งยอดโดยเฉพาะ
                document.getElementById('payment-banner-img').src = storeSettings.paymentBannerUrl;
            } else if (pageId === 'admin') {
                mainContent.innerHTML = document.getElementById('tpl-admin').innerHTML;
                fillAdminSettings();
            }
        }

        async function loadInitialData() {
            Swal.fire({ title: 'กำลังโหลดข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const response = await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ action: "getInitialData", data: {} }) });
                const result = await response.json();
                if (result.status === "success") {
                    storeProducts = result.products;
                    if(result.settings && Object.keys(result.settings).length > 0) {
                        storeSettings = { ...storeSettings, ...result.settings };
                    }
                    Swal.close();
                    renderStoreHome(); 
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        function renderStoreHome() {
            const slider = document.getElementById('main-banner-slider');
            if(slider) {
                const banners = storeSettings.bannerUrls.split(',').map(u => u.trim()).filter(u => u !== "");
                slider.innerHTML = banners.map(url => `<img src="${url}" class="w-full h-full object-cover absolute top-0 left-0 transition-opacity duration-1000 opacity-0 banner-img">`).join('');
                
                if(banners.length > 0) {
                    const imgs = document.querySelectorAll('.banner-img');
                    imgs[0].classList.replace('opacity-0', 'opacity-100');
                    if(banners.length > 1) {
                        let curIdx = 0;
                        clearInterval(bannerInterval);
                        bannerInterval = setInterval(() => {
                            imgs[curIdx].classList.replace('opacity-100', 'opacity-0');
                            curIdx = (curIdx + 1) % banners.length;
                            imgs[curIdx].classList.replace('opacity-0', 'opacity-100');
                        }, 5000);
                    }
                }
            }

            const grid = document.getElementById('product-grid');
            if (storeProducts.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10 text-sm">ยังไม่มีสินค้าในสต็อก</div>`;
                return;
            }

            grid.innerHTML = storeProducts.map(p => {
                if(!p['ชื่อสินค้า']) return ''; 
                return `
                <div class="card-minimal p-3 cursor-pointer" onclick="openProductDetail(${p['ID']})">
                    <div class="bg-gray-50 rounded-xl p-2 mb-3 aspect-square flex items-center justify-center">
                        <img src="${p['รูปภาพ']}" alt="${p['ชื่อสินค้า']}" class="max-h-full object-contain">
                    </div>
                    <h3 class="font-medium text-sm text-gray-800 line-clamp-1 mb-1">${p['ชื่อสินค้า']}</h3>
                    <div class="flex justify-between items-end mt-2">
                        <div>
                            <p class="text-[10px] text-gray-400">ดาวน์เริ่มต้น</p>
                            <p class="text-pastel-500 font-medium text-sm">${Number(p['ดาวน์เริ่มต้น']).toLocaleString()} ฿</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openProductDetail(productId) {
            const product = storeProducts.find(p => p['ID'] == productId);
            if(!product) return;

            document.getElementById('modal-img').src = product['รูปภาพ'];
            document.getElementById('modal-title').innerText = product['ชื่อสินค้า'];
            document.getElementById('modal-price').innerText = Number(product['ราคาเต็ม']).toLocaleString();
            document.getElementById('modal-down').innerText = Number(product['ดาวน์เริ่มต้น']).toLocaleString();

            populateSelect('sel-storage', product['ความจุ']);
            populateSelect('sel-color', product['สี']);

            selectedProductInfo = {
                name: product['ชื่อสินค้า'],
                price: Number(product['ราคาเต็ม']),
                down: Number(product['ดาวน์เริ่มต้น']),
                allowType: product['ประเภทการผ่อน'] || 'เปิดให้เลือกทั้ง 2 แบบ'
            };

            const btnUse = document.getElementById('btn-type-use');
            const btnEnd = document.getElementById('btn-type-end');
            
            btnUse.style.display = 'block';
            btnEnd.style.display = 'block';

            if (selectedProductInfo.allowType === 'ผ่อนไปใช้ไป') {
                btnEnd.style.display = 'none'; selectInstallmentType('ผ่อนไปใช้ไป');
            } else if (selectedProductInfo.allowType === 'ผ่อนจบรับของ') {
                btnUse.style.display = 'none'; selectInstallmentType('ผ่อนจบรับของ');
            } else {
                selectInstallmentType('ผ่อนไปใช้ไป');
            }

            calculateInstallment();
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function populateSelect(elementId, dataString) {
            const select = document.getElementById(elementId);
            if(!dataString) { select.innerHTML = '<option value="-">-</option>'; return; }
            select.innerHTML = dataString.split(',').map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

        function selectInstallmentType(type) {
            selectedProductInfo.type = type;
            const btnUse = document.getElementById('btn-type-use');
            const btnEnd = document.getElementById('btn-type-end');
            const desc = document.getElementById('type-desc');

            const activeClass = "border border-pastel-400 bg-pastel-50 text-pastel-600".split(' ');
            const inactiveClass = "border border-gray-200 text-gray-500 bg-white".split(' ');

            if(type === 'ผ่อนไปใช้ไป') {
                btnUse.classList.remove(...inactiveClass); btnUse.classList.add(...activeClass);
                btnEnd.classList.remove(...activeClass); btnEnd.classList.add(...inactiveClass);
                desc.innerText = 'ได้รับสินค้าไปใช้เมื่อผ่อนถึง 30-55% ของราคาเครื่อง';
            } else {
                btnEnd.classList.remove(...inactiveClass); btnEnd.classList.add(...activeClass);
                btnUse.classList.remove(...activeClass); btnUse.classList.add(...inactiveClass);
                desc.innerText = 'ได้รับสินค้าเมื่อชำระยอดผ่อนครบ 100% ของราคาเครื่อง';
            }
        }

        function calculateInstallment() {
            let amount = parseInt(document.getElementById('calc-amount').value);
            if (isNaN(amount) || amount < 350) {
                document.getElementById('calc-duration').innerText = `ขั้นต่ำ 350`;
                return;
            }
            const cycleCount = Math.ceil((selectedProductInfo.price - selectedProductInfo.down) / amount);
            selectedProductInfo.amountPerCycle = amount;
            selectedProductInfo.cycle = document.getElementById('calc-cycle').value;
            selectedProductInfo.duration = cycleCount;
            document.getElementById('calc-duration').innerText = `${cycleCount} งวด`;
        }

        function confirmProductToRegister() {
            if (parseInt(document.getElementById('calc-amount').value) < 350) {
                Swal.fire('แจ้งเตือน', 'ยอดส่งต้องขั้นต่ำ 350 บาทขึ้นไปค่ะ', 'warning'); return;
            }
            selectedProductInfo.storage = document.getElementById('sel-storage').value;
            selectedProductInfo.color = document.getElementById('sel-color').value;
            closeModal();
            switchPage('register');
        }

        async function submitRegistration(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-submit-btn');
            btn.innerHTML = 'กำลังบันทึก...'; btn.disabled = true;

            const file = document.getElementById('reg-file').files[0];
            if(!file) { Swal.fire('แจ้งเตือน', 'กรุณาแนบรูปบัตรประชาชนค่ะ', 'warning'); btn.innerHTML = 'ยืนยันลงทะเบียน'; btn.disabled = false; return; }

            const reader = new FileReader();
            reader.onload = async function() {
                const payloadData = {
                    firstName: document.getElementById('reg-firstname').value,
                    lastName: document.getElementById('reg-lastname').value,
                    phone: document.getElementById('reg-phone').value,
                    idCard: document.getElementById('reg-idcard').value,
                    dob: document.getElementById('reg-dob').value,
                    age: document.getElementById('reg-age').value,
                    province: document.getElementById('reg-province').value,
                    gender: document.getElementById('reg-gender').value,
                    
                    productName: selectedProductInfo.name || "-",
                    storage: selectedProductInfo.storage || "-",
                    color: selectedProductInfo.color || "-",
                    price: selectedProductInfo.price || 0,
                    downPayment: selectedProductInfo.down || 0,
                    installmentType: selectedProductInfo.type || "-",
                    cycle: selectedProductInfo.cycle || "-",
                    amountPerCycle: selectedProductInfo.amountPerCycle || 0,
                    duration: selectedProductInfo.duration || 0,
                    
                    fileBase64: reader.result.split(',')[1],
                    mimeType: file.type
                };

                try {
                    const res = await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ action: "register", data: payloadData }) });
                    const result = await res.json();
                    if(result.status === "success") {
                        Swal.fire({ title: 'ลงทะเบียนสำเร็จ!', icon: 'success', confirmButtonColor: '#f06292' }).then(() => switchPage('payment'));
                    } else { throw new Error(result.message); }
                } catch (err) { Swal.fire('ผิดพลาด', 'ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่', 'error'); } 
                finally { btn.innerHTML = 'ยืนยันลงทะเบียน'; btn.disabled = false; }
            };
            reader.readAsDataURL(file);
        }

        async function promptAdminLogin() {
            const { value: pass } = await Swal.fire({
                title: 'โหมดแอดมิน', input: 'password', confirmButtonColor: '#f06292', showCancelButton: true
            });
            if (pass === ADMIN_PASSWORD) { switchPage('admin'); } 
            else if (pass) { Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง' }); }
        }

        function fillAdminSettings() {
            document.getElementById('adm-main-banner').value = storeSettings.bannerUrls || "";
            document.getElementById('adm-pay-banner').value = storeSettings.paymentBannerUrl || "";
            document.getElementById('adm-popup').value = storeSettings.welcomePopup || "";
            document.getElementById('adm-fb').value = storeSettings.fbUrl || "";
            document.getElementById('adm-line').value = storeSettings.lineUrl || "";
        }

        async function adminSaveSettings() {
            const payload = {
                bannerUrls: document.getElementById('adm-main-banner').value,
                paymentBannerUrl: document.getElementById('adm-pay-banner').value,
                welcomePopup: document.getElementById('adm-popup').value,
                fbUrl: document.getElementById('adm-fb').value,
                lineUrl: document.getElementById('adm-line').value
            };
            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
            try {
                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ action: "saveSettings", data: payload }) });
                Swal.fire('สำเร็จ', 'บันทึกตั้งค่าเรียบร้อย', 'success');
                storeSettings = { ...storeSettings, ...payload };
            } catch (e) { Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error'); }
        }

        async function adminAddProduct() {
            const name = document.getElementById('adm-prod-name').value;
            const price = document.getElementById('adm-prod-price').value;
            if(!name || !price) { Swal.fire('แจ้งเตือน', 'กรุณาใส่ชื่อและราคา', 'warning'); return; }

            const payload = {
                name: name, imageUrl: document.getElementById('adm-prod-img').value,
                category: document.getElementById('adm-prod-cat').value, storage: document.getElementById('adm-prod-storage').value || "-",
                color: document.getElementById('adm-prod-color').value || "-", type: document.getElementById('adm-prod-type').value,
                price: price, downPayment: document.getElementById('adm-prod-down').value || 0
            };

            Swal.fire({ title: 'กำลังเพิ่มสต็อก...', didOpen: () => Swal.showLoading() });
            try {
                await fetch(GAS_WEBAPP_URL, { method: 'POST', body: JSON.stringify({ action: "addProduct", data: payload }) });
                Swal.fire('สำเร็จ', 'เพิ่มสินค้าเข้าสต็อกแล้ว รีเฟรชเพื่อดูผล', 'success');
                document.querySelectorAll('#tpl-admin input').forEach(el => el.value = ''); fillAdminSettings();
            } catch (e) { Swal.fire('ผิดพลาด', 'เพิ่มไม่สำเร็จ', 'error'); }
        }

        function showWelcomePopup() {
            if(storeSettings.welcomePopup) {
                Swal.fire({ html: `<p class="font-heading text-lg text-gray-800">${storeSettings.welcomePopup}</p>`, confirmButtonText: 'เข้าสู่ร้านค้า', confirmButtonColor: '#f06292', backdrop: `rgba(0,0,0,0.4)` });
            }
        }
        function showContactInfo() { window.open(storeSettings.lineUrl, '_blank'); }
        function openLine() { window.open(storeSettings.lineUrl, '_blank'); }
    </script>
</body>
</html>
